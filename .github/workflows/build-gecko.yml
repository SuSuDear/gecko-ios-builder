name: Build Gecko iOS dist

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub Release tag to publish asset to'
        required: true
        default: 'gecko-ios-aarch64-zh'
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-gecko:
    runs-on: macos-26
    timeout-minutes: 360

    env:
      # Firefox mobile/ios target requires recent Apple SDKs.
      # Keep this aligned with reynard-browser/.github/workflows/build-ios.yml.
      MACH_BUILD_PYTHON_NATIVE_PACKAGE_SOURCE: system
      DEVELOPER_DIR: /Applications/Xcode_26.4.1.app/Contents/Developer

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Read Firefox release tag
        id: gecko-tag
        shell: bash
        run: |
          tag="$(tr -d '\000\r' < engine/release.txt | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          if [ -z "$tag" ]; then
            echo "::error::engine/release.txt is empty"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Firefox tag: $tag"

      - name: Select Xcode 26.4.1 (iOS SDK 26.4)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Verify Xcode and iOS SDK
        shell: bash
        run: |
          xcodebuild -version
          echo "---"
          xcrun --sdk iphoneos --show-sdk-version
          echo "---"
          xcodebuild -showsdks | grep -i ios || true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install build dependencies
        shell: bash
        run: |
          brew update
          brew install ldid lld
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install zstandard
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Cache Firefox source
        id: cache-firefox-src
        uses: actions/cache@v4
        with:
          path: engine/firefox
          key: firefox-src-${{ steps.gecko-tag.outputs.tag }}-v1

      - name: Fetch Firefox source
        if: steps.cache-firefox-src.outputs.cache-hit != 'true'
        run: ./tools/development/fetch-firefox.sh

      - name: Ensure Firefox source exists after cache restore
        if: steps.cache-firefox-src.outputs.cache-hit == 'true'
        run: git -C engine/firefox rev-parse --short HEAD

      - name: Apply patches
        shell: bash
        run: |
          if git -C engine/firefox diff --quiet; then
            ./tools/development/apply-patches.sh
          else
            echo "engine/firefox already has working-tree modifications; assuming patches applied."
          fi

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: cargo-${{ runner.os }}-${{ hashFiles('engine/firefox/**/Cargo.lock', 'engine/firefox/**/Cargo.toml') }}-v1
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Rust-based build tools
        shell: bash
        run: |
          if ! command -v cbindgen >/dev/null 2>&1; then
            cargo install --locked cbindgen
          fi
          cbindgen --version

      - name: Cache Gecko build directory
        uses: actions/cache@v4
        with:
          path: |
            engine/firefox/obj-aarch64-apple-ios
            ~/.mozbuild
          key: gecko-build-${{ runner.os }}-${{ steps.gecko-tag.outputs.tag }}-${{ hashFiles('patches/**/*.patch', 'tools/development/build-gecko.sh') }}-v1
          restore-keys: |
            gecko-build-${{ runner.os }}-${{ steps.gecko-tag.outputs.tag }}-

      - name: Check restored Gecko dist
        id: restored-gecko-dist
        shell: bash
        run: |
          OBJDIR="engine/firefox/obj-aarch64-apple-ios"
          if [ -d "$OBJDIR/dist/bin" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Using restored Gecko dist from cache."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No restored Gecko dist found; building Gecko."
          fi

      - name: Fetch Mozilla toolchain artifacts
        if: steps.restored-gecko-dist.outputs.found != 'true'
        working-directory: engine/firefox
        run: ./mach configure 2>&1 | tail -200

      - name: Build Gecko engine
        if: steps.restored-gecko-dist.outputs.found != 'true'
        run: ./tools/development/build-gecko.sh

      - name: Inspect Gecko output
        shell: bash
        run: |
          OBJDIR="engine/firefox/obj-aarch64-apple-ios"
          if [ ! -d "$OBJDIR/dist/bin" ]; then
            echo "::error::Gecko build did not produce $OBJDIR/dist/bin"
            exit 1
          fi
          ls -la "$OBJDIR/dist/bin" | head -40

      - name: Package Gecko dist
        shell: bash
        run: |
          set -euo pipefail
          OBJDIR="engine/firefox/obj-aarch64-apple-ios"
          ASSET="gecko-ios-aarch64-dist.tar.zst"
          STAGE="_package/gecko-ios-aarch64"
          test -d "$OBJDIR/dist/bin"

          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          # The Gecko dist contains symlinks into the builder workspace.
          # Materialize them so downstream repositories can consume the tarball.
          rsync -aL "$OBJDIR/dist/" "$STAGE/dist/"

          DEFAULT_THEME_SRC="engine/firefox/toolkit/mozapps/extensions/default-theme"
          if [ -d "$DEFAULT_THEME_SRC" ]; then
            rm -rf "$STAGE/dist/bin/default-theme"
            mkdir -p "$STAGE/dist/bin/default-theme"
            rsync -aL "$DEFAULT_THEME_SRC/" "$STAGE/dist/bin/default-theme/"
          else
            echo "::warning::Missing $DEFAULT_THEME_SRC; packaged dist will not include default-theme"
          fi

          if find "$STAGE/dist" -type l -print -quit | grep -q .; then
            echo "::error::Packaged Gecko dist still contains symlinks"
            find "$STAGE/dist" -type l -ls | head -50
            exit 1
          fi

          tar --zstd -cf "$ASSET" -C "$STAGE" dist
          shasum -a 256 "$ASSET" | tee "$ASSET.sha256"
          ls -lh "$ASSET" "$ASSET.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gecko-ios-aarch64-dist
          path: |
            gecko-ios-aarch64-dist.tar.zst
            gecko-ios-aarch64-dist.tar.zst.sha256
          if-no-files-found: error

      - name: Resolve GitHub Release tag
        id: release
        shell: bash
        run: |
          tag="${{ github.event.inputs.release_tag }}"
          if [ -z "$tag" ]; then
            tag="gecko-ios-aarch64-portable"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Publish GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          files: |
            gecko-ios-aarch64-dist.tar.zst
            gecko-ios-aarch64-dist.tar.zst.sha256
          make_latest: false
          fail_on_unmatched_files: true
          overwrite_files: true
